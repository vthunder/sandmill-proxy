; WebOne Configuration for Mac OS 8 / Netscape 2.02 retro proxy
; Listens on 127.0.0.1:8080

[Server]
Port=8080
DefaultHostName=127.0.0.1
UserAgent=Mozilla/2.02 (Macintosh; I; PPC)
HideClientErrors=yes
SearchInArchive=no
ValidateCertificates=no
EnableManualConverting=yes
TemporaryDirectory=%TEMP%
AppendLogFile=%SYSLOGDIR%/webone.log
DisplayStatusPage=short
ContentDirectory=/html
; Don't use chunked transfer encoding - old browsers may not handle it
SendChunkedRequests=no

[SecureProxy]
SslEnable=no

[Converters]
convert %SRC% %ARG1% %DESTEXT%:- %ARG2%
magick %SRC% %ARG1% %DEST% %ARG2%

[TextTypes]
text/
javascript
json
xml

; ---- HTML stripping: remove scripts, styles, and CSS links ----
; Strip <script> blocks from HTML pages (prevents JS crashes in old browsers)
[Edit]
OnContentType=text/html
OnCode=200
RemoveMarkup=<script

; Strip <style> blocks from HTML pages
[Edit]
OnContentType=text/html
OnCode=200
RemoveMarkup=<style

; Strip <link> tags (removes external CSS stylesheets)
[Edit]
OnContentType=text/html
OnCode=200
RemoveMarkup=<link

; ---- Block heavy resource types entirely ----
; Return empty response for JavaScript files
[Edit]
OnContentType=text/javascript
OnCode=200
SetBody=

; Return empty response for application/javascript
[Edit]
OnContentType=application/javascript
OnCode=200
SetBody=

; Return empty response for CSS files (already removed links, but block direct fetches)
[Edit]
OnContentType=text/css
OnCode=200
SetBody=

; NOTE: WebOne 0.18.1 header deletion syntax not confirmed - omitted for now.
; Image conversion sections below handle PNG/WebP -> JPEG for Netscape 2.02.

; Convert PNG to JPEG and resize for Netscape 2.02
[Edit]
OnContentType=image/png
OnCode=200
IgnoreUrl=webdav
AddConvert=magick
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg

; Convert WebP to JPEG and resize for Netscape 2.02
[Edit]
OnContentType=image/webp
OnCode=200
IgnoreUrl=webdav
AddConvert=magick
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg

; Resize existing JPEGs too
[Edit]
OnContentType=image/jpeg
OnCode=200
IgnoreUrl=webdav
AddConvert=magick
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg
