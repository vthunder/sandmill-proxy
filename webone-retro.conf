; WebOne Configuration for Mac OS 8 / Netscape 2.02 retro proxy
; Listens on 127.0.0.1:8080

[Server]
Port=8080
DefaultHostName=proxy.sandmill.org
UserAgent=Mozilla/2.02 (Macintosh; I; PPC)
HideClientErrors=yes
SearchInArchive=no
ValidateCertificates=no
EnableManualConverting=yes
TemporaryDirectory=%TEMP%
AppendLogFile=%SYSLOGDIR%/webone.log
DisplayStatusPage=short
ContentDirectory=/html

[SecureProxy]
SslEnable=no

; Force uncompressed responses so Edit rules can apply regex to HTML/CSS text.
; Sites like sandmill.org serve gzip by default; compressed bodies bypass regex stripping.
; Also add CORS headers so the JS Virtual Gateway (running in CF Worker iframe) can fetch().
[Edit]
AddRequestHeader=Accept-Encoding: identity
AddResponseHeader=Access-Control-Allow-Origin: *
AddResponseHeader=Cross-Origin-Resource-Policy: cross-origin

[Converters]
convert %SRC% %ARG1% %DESTEXT%:- %ARG2%
magick %SRC% %ARG1% %DEST% %ARG2%

[TextTypes]
text/
javascript
json
xml

; ---- HTML stripping: remove scripts, styles, and CSS links ----
; Strip <script>...</script> blocks from HTML (prevents JS crashes in Netscape)
[Edit]
OnContentType=text/html
OnCode=200
AddFind=<script[\s\S]*?</script\s*>
AddReplace=

; Strip <style>...</style> blocks from HTML
[Edit]
OnContentType=text/html
OnCode=200
AddFind=<style[\s\S]*?</style\s*>
AddReplace=

; Strip <link> tags from HTML (removes CSS stylesheet and preload references)
[Edit]
OnContentType=text/html
OnCode=200
AddFind=<link[^>]*>
AddReplace=

; ---- Block Google Fonts entirely ----
; Strip @font-face and @import for Google Fonts from any CSS that gets through
[Edit]
OnContentType=text/css
OnCode=200
AddFind=@import\s+url\([^)]*fonts\.googleapis\.com[^)]*\)[^;]*;?
AddReplace=

[Edit]
OnContentType=text/css
OnCode=200
AddFind=@font-face\s*\{[^}]*\}
AddReplace=

; Block responses from fonts.googleapis.com and fonts.gstatic.com by emptying them
[Edit]
OnUrl=fonts.googleapis.com
AddFind=[\s\S]*
AddReplace=

[Edit]
OnUrl=fonts.gstatic.com
AddFind=[\s\S]*
AddReplace=

; NOTE: WebOne 0.18.1 [Edit] uses AddFind/AddReplace (regex). RemoveMarkup/SetBody are not valid.
; Image conversion sections below handle PNG/WebP -> JPEG for Netscape 2.02.

; Convert PNG to JPEG and resize for Netscape 2.02
[Edit]
OnContentType=image/png
OnCode=200
IgnoreUrl=webdav
AddConvert=convert
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg

; Convert WebP to JPEG and resize for Netscape 2.02
[Edit]
OnContentType=image/webp
OnCode=200
IgnoreUrl=webdav
AddConvert=convert
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg

; Resize existing JPEGs too
[Edit]
OnContentType=image/jpeg
OnCode=200
IgnoreUrl=webdav
AddConvert=convert
AddConvertDest=jpg
AddConvertArg1=-resize 320x240> -quality 80
AddResponseHeader=Content-Type: image/jpeg
